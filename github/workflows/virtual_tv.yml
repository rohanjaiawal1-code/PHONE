name: Android TV Virtual Test

on:
  workflow_dispatch: # Actions tab se manually run karne ke liye

jobs:
  run-virtual-tv:
    runs-on: macos-latest # Android emulator ke liye macOS runner sabse best hai
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Android Support Files
        run: flutter create . --platforms=android --org com.gome.app

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Debug APK for Testing
        run: flutter build apk --debug

      - name: Start Virtual Android TV and Test App
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: tv_720p # Yeh explicitly Android TV layout set karta hai
          script: |
            echo "Virtual Android TV boot ho raha hai..."
            adb devices
            
            echo "App ko Virtual TV par install kiya ja raha hai..."
            adb install build/app/outputs/flutter-apk/app-debug.apk
            
            echo "App launch ki ja rahi hai..."
            adb shell am start -n com.gome.app/.MainActivity
            
            echo "Virtual TV Test Successfully Completed!"
