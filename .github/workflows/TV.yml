name: Remote Virtual Android TV (ADB + Ngrok)

on:
  workflow_dispatch:

jobs:
  virtual-tv:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Start Android TV Emulator & Tunnel
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: tv_720p
          script: |
            echo "Virtual Android TV successfully boot ho chuka hai!"
            
            # ADB network port configure karein
            adb tcpip 5555
            
            # Ngrok install aur start karein
            brew install ngrok/core/ngrok
            echo "Ngrok tunnel establish ki ja rahi hai..."
            ngrok tcp 5555 &
            
            # Connection zinda rakhne ke liye sleep
            echo "Virtual TV is ready for remote access!"
            sleep 7200
